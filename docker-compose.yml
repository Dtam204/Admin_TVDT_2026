services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: thuvien_tn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-library_tn}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - thuvien_tn_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-library_tn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thuvien_tn_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-5000}
      DOMAIN: ${DOMAIN:-thuvientn.site}
      PROTOCOL: ${PROTOCOL:-https}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://api.thuvientn.site}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://thuvientn.site,https://www.thuvientn.site}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-library_tn}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SEPAY_WEBHOOK_KEY: ${SEPAY_WEBHOOK_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-Thu vien TN <noreply@thuvientn.site>}
    volumes:
      - ./backend/uploads:/app/uploads
      - backend_node_modules:/app/node_modules
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - thuvien_tn_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thuvien_tn_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.thuvientn.site}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://api.thuvientn.site}
      # API_THUVIEN_TN_URL và NEXT_PUBLIC_API_THUVIEN_TN_URL dùng chung endpoint API chính
      API_THUVIEN_TN_URL: ${API_THUVIEN_TN_URL:-https://api.thuvientn.site}
      NEXT_PUBLIC_API_THUVIEN_TN_URL: ${NEXT_PUBLIC_API_THUVIEN_TN_URL:-https://api.thuvientn.site}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - thuvien_tn_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/admin/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  backend_node_modules:
    driver: local

networks:
  thuvien_tn_network:
    driver: bridge

